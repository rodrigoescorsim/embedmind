name: Release

# Fires on a version tag (`v*`), and can be dispatched manually against a tag
# for a dry run (`v0.1.0-rc1`). Publication to crates.io and the definitive
# v0.1.0 Release are MANUAL — founder acts (docs/04-agents.md guardrail 7);
# this workflow only builds artifacts and attaches them to the tag's Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build a Release for (e.g. v0.1.0-rc1)"
        required: true

env:
  CARGO_TERM_COLOR: always
  # Download/install-size ceiling for the distributed artifact, incl. the
  # embedded ONNX model + tokenizer (docs/01-spec.md S8 NFR, ADR 0010).
  # The raw binary links ONNX Runtime statically (~45 MiB); it is shipped
  # compressed (~20 MiB), and this ceiling governs that download. Failing it
  # fails the job.
  MAX_ARTIFACT_BYTES: 41943040 # 40 * 1024 * 1024

jobs:
  # Gate: the whole suite (unit + crash harness + E2E + fuzz smoke) must be
  # green on every first-class platform before any artifact is published.
  # Mirrors the CI matrix so we never ship what wouldn't pass it.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort.pyke.io
            ~/Library/Caches/ort.pyke.io
            ~/AppData/Local/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Tests
        run: cargo test --workspace

  build:
    name: build (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: embedmind
            asset: embedmind-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: embedmind.exe
            asset: embedmind-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: embedmind
            asset: embedmind-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort.pyke.io
            ~/Library/Caches/ort.pyke.io
            ~/AppData/Local/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      # Release profile (LTO, codegen-units=1, strip) comes from the root
      # Cargo.toml — no flags needed here beyond selecting the profile.
      - name: Build release binary
        run: cargo build --release --locked -p embedmind --target ${{ matrix.target }}

      # Install smoke test: exercise the freshly built binary exactly as a
      # user gets it — `--version` plus a full remember -> recall -> stats
      # cycle over a throwaway .mind (story S8, scripts/smoke_install.sh). Runs
      # on every target in the matrix, so the artifact's quickstart is proven
      # on Linux, Windows and macOS before it is packaged and attached.
      - name: Install smoke test (remember → recall → stats)
        shell: bash
        run: EMBEDMIND_BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}" ./scripts/smoke_install.sh

      # Package the single self-contained binary (ONNX model + tokenizer are
      # embedded via include_bytes!, ADR 0004; ONNX Runtime is linked
      # statically, ADR 0010 — so one file is all a user needs).
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          case "${{ matrix.asset }}" in
            *.zip) 7z a -tzip "dist/${{ matrix.asset }}" "$src" >/dev/null ;;
            *.tar.gz) tar -czf "dist/${{ matrix.asset }}" -C "$(dirname "$src")" "$(basename "$src")" ;;
          esac

      # The NFR ceiling protects download/install speed (docs/01-spec.md S8);
      # it governs the compressed artifact the user actually downloads.
      - name: Verify artifact size (< 40 MB, model embedded)
        shell: bash
        run: |
          size=$(wc -c < "dist/${{ matrix.asset }}")
          human=$(( size / 1024 / 1024 ))
          echo "Artifact ${{ matrix.asset }}: ${size} bytes (~${human} MiB), ceiling ${MAX_ARTIFACT_BYTES} bytes"
          if [ "$size" -gt "$MAX_ARTIFACT_BYTES" ]; then
            echo "::error::Artifact ${size} bytes exceeds the ${MAX_ARTIFACT_BYTES}-byte ceiling (docs/01-spec.md S8 NFR)."
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

      # Attach to the tag's GitHub Release. Only on a real tag push — a manual
      # dispatch stays a dry run (artifacts above, no Release mutation), so an
      # agent/CI run never publishes on its own (guardrail 7).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true

  # Python bindings (B5, roadmap 2.5): build an abi3 wheel per first-class
  # platform (one wheel covers CPython 3.9+ on that OS). Gated on the same
  # `test` job as the binaries — we never ship a wheel the suite would fail.
  # Publishing to PyPI stays MANUAL (founder), like crates.io: this job builds
  # and attaches the wheels, it does not upload them anywhere.
  wheels:
    name: wheels (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort.pyke.io
            ~/Library/Caches/ort.pyke.io
            ~/AppData/Local/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      # Build the abi3 wheel. The bindings crate is its own workspace
      # (bindings/python), so maturin runs against that manifest directly.
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
          # Linux wheels build in a manylinux container by default; the ort
          # ONNX Runtime download works there, but pin the image explicitly so
          # the glibc floor is predictable.
          manylinux: ${{ matrix.os == 'ubuntu-latest' && '2_28' || 'auto' }}

      # Prove the freshly built wheel installs and its full remember → recall →
      # forget → stats → vacuum cycle works — the pytest E2E suite (the Python
      # half of scripts/smoke_install.sh's Rust cycle). The Rust↔Python
      # round-trip tests skip here (no CLI binary in this job); they run in the
      # `test` job's `cargo test` on every platform.
      - name: Install wheel and run pytest
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install --find-links dist --no-index embedmind
          python -m pytest bindings/python/tests -v

      - name: Verify wheel size (< 40 MB, model embedded)
        shell: bash
        run: |
          wheel=$(ls dist/*.whl | head -n1)
          size=$(wc -c < "$wheel")
          human=$(( size / 1024 / 1024 ))
          echo "Wheel $(basename "$wheel"): ${size} bytes (~${human} MiB), ceiling ${MAX_ARTIFACT_BYTES} bytes"
          if [ "$size" -gt "$MAX_ARTIFACT_BYTES" ]; then
            echo "::error::Wheel ${size} bytes exceeds the ${MAX_ARTIFACT_BYTES}-byte ceiling (docs/01-spec.md S8 NFR)."
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Attach wheels to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true
