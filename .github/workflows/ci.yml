name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is a first-class target (founder dogfoods there) — never drop it.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # Placeholders for M1 item 1.8 — wired up together with the storage layer:
  #   - crash-harness job (fault-injection sweep, Linux + Windows)
  #   - cargo-fuzz short pass (Linux)
  #   - benchmark regression guard (see docs/BENCHMARKS.md §5)
