name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is a first-class target (founder dogfoods there) — never drop it.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # The crash harness (fault-injection sweep, docs/TESTING.md §2) runs as part
  # of `cargo test` above, on every platform in the matrix — including Windows,
  # which is first-class, not a port.
  #
  # Remaining placeholders for M1 item 1.8:
  #   - cargo-fuzz short pass (Linux) — targets from docs/TESTING.md §3
  #   - benchmark regression guard (see docs/BENCHMARKS.md §5)
