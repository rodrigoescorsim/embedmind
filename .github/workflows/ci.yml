name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Long fuzz pass (docs/TESTING.md §3): 1h per target, one job per target
    # in parallel (see the fuzz job's matrix) so no single job approaches the
    # 6h GitHub ceiling. Mon/Wed/Fri rather than nightly — three clean passes a
    # week still satisfy the release gate's consecutive-run requirement while
    # cutting scheduled runner spend and failure-mail noise by more than half.
    # Only effective while the repo is PUBLIC (free minutes): on a private repo
    # the nightly-gate job below skips it.
    - cron: "0 3 * * 1,3,5"
  workflow_dispatch:
    inputs:
      full:
        description: "Full run even on a private repo (Windows+macOS matrix + fuzz short pass + python bindings)"
        type: boolean
        default: false

# A newer push to the same ref supersedes the in-flight run — cancel it
# instead of billing both (the 2026-07-10 red-push sequence paid every one).
# Scheduled runs keep their own group and never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  CARGO_TERM_COLOR: always

# ── Economy mode by repo visibility ─────────────────────────────────────────
# PRIVATE repo → Actions minutes are metered (2,000/month; Windows bills 2×,
# macOS 10×): PR/push tests shrink to ubuntu-only, the fuzz short pass is
# skipped (the stable fuzz smoke inside `cargo test` still runs), python
# bindings run only on pushes to main, and the nightly fuzz is skipped.
# PUBLIC repo → minutes are free; everything runs exactly as designed, with
# no workflow edit needed: detection is per-event via
# github.event.repository.private (nightly uses an API gate — the schedule
# payload has no reliable repository object).
# Manual full run at any time:  gh workflow run ci.yml -f full=true

jobs:
  test:
    name: test (${{ matrix.os }})
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        # Windows is a first-class target (founder dogfoods there) — never drop
        # it from a PUBLIC run. While the repo is private, PR/push feedback is
        # ubuntu-only (Windows bills 2×, macOS 10×); Windows coverage still
        # comes from the founder's machine (panel verify_command gate mirrors
        # fmt+clippy+test there) and from release.yml's full matrix, and the
        # complete matrix is one `-f full=true` dispatch away.
        os: ${{ fromJSON((github.event.repository.private == true && inputs.full != true) && '["ubuntu-latest"]' || '["ubuntu-latest", "windows-latest", "macos-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort.pyke.io
            ~/Library/Caches/ort.pyke.io
            ~/AppData/Local/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # The crash harnesses (pager-level `crash.rs` + record-level
  # `crash_records.rs`, docs/TESTING.md §2) run inside `cargo test` above on
  # every platform in the matrix — including Windows, which is first-class.
  #
  # The fuzz bodies also run a stable smoke pass inside `cargo test`
  # (embedmind-core::fuzz); the job below runs the same bodies
  # coverage-guided with libFuzzer.
  # The schedule event payload carries no reliable repository object, so the
  # nightly asks the API whether the repo is public before spending 7h of
  # runner time. Costs ~1 billable min/night while private — vs ~420 for a
  # completed nightly fuzz.
  nightly-gate:
    name: nightly gate (fuzz only when repo is public)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      public: ${{ steps.vis.outputs.public }}
    steps:
      - id: vis
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "public=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.private | not')" >> "$GITHUB_OUTPUT"

  fuzz:
    name: fuzz ${{ matrix.target }} (${{ github.event_name == 'schedule' && '1h' || 'short' }})
    needs: nightly-gate
    # Scheduled: only when the gate confirms the repo is public. Short pass
    # (push/PR): public repo or explicit full dispatch — on a private repo the
    # stable fuzz smoke inside `cargo test` still covers the fuzz bodies.
    # !cancelled() lets the job run on push/PR where nightly-gate is skipped.
    if: >-
      ${{ !cancelled() && (
        (github.event_name == 'schedule' && needs.nightly-gate.outputs.public == 'true') ||
        (github.event_name != 'schedule' && (github.event.repository.private == false || inputs.full == true))
      ) }}
    runs-on: ubuntu-latest
    # One target per job, in parallel: the old single job ran 7×1h sequentially
    # (~7h) and the GitHub-hosted 6h ceiling cancelled it every scheduled run —
    # a daily failure mail and a permanently-red release gate. Each target now
    # gets its own ~1h job that finishes well inside the ceiling. fail-fast off
    # so one target's crash still lets the others report (and each uploads its
    # own artifact). The 90-min timeout is an explicit belt over the 1h budget
    # (install + build + corpus replay headroom), replacing the implicit 6h.
    strategy:
      fail-fast: false
      matrix:
        # All fuzz targets in fuzz/fuzz_targets/. Parallel jobs, so this list
        # can cover every target without lengthening the wall-clock pass —
        # fuzz_filter_meta_page (the FTOPT sidecar target) was missing from the
        # old sequential loop and is included here.
        target:
          - fuzz_header
          - fuzz_page
          - fuzz_record
          - fuzz_fts_page
          - fuzz_graph_page
          - fuzz_wal_replay
          - fuzz_open_full
          - fuzz_filter_meta_page
    timeout-minutes: 90
    env:
      # cargo-fuzz precisa de nightly (flags -Z), mas o rust-toolchain.toml da
      # raiz pina stable e vence o default do dtolnay/rust-toolchain@nightly
      # (precedência do rustup: env > arquivo > default). O env vence o arquivo.
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore accumulated corpus
        # The seed corpus is committed; coverage-driven additions accumulate
        # across runs through this cache (docs/TESTING.md §3). Keyed per target
        # so the parallel matrix jobs never clobber each other's cache entry.
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-
      - name: Fuzz ${{ matrix.target }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then per_target=3600; else per_target=120; fi
          cargo fuzz run "${{ matrix.target }}" -- -max_total_time="$per_target" -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts

  # Python bindings (B5, roadmap 2.5). Their own workspace (bindings/python),
  # so `cargo clippy/test --workspace` above does not reach them — lint, build
  # and exercise them here. One Linux run is enough for PR feedback; the
  # per-platform wheels + pytest live in the release workflow.
  python-bindings:
    name: python bindings
    # One of the most expensive ubuntu jobs here (release build of the CLI +
    # wheel). While the repo is private, PR feedback is deferred to the push
    # on main after merge (or a `-f full=true` dispatch); public repo runs it
    # on every PR as designed.
    if: >-
      ${{ github.event_name != 'schedule' && (
        github.event.repository.private == false ||
        github.event_name == 'push' ||
        inputs.full == true
      ) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Format
        run: cargo fmt --manifest-path bindings/python/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path bindings/python/Cargo.toml --all-targets -- -D warnings
      # Build the CLI so the Rust↔Python round-trip tests run (they skip when
      # no binary is found); then build + install the wheel and run pytest.
      - name: Build CLI (for round-trip tests)
        run: cargo build --release -p embedmind
      - name: Build + install wheel and run pytest
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --manifest-path bindings/python/Cargo.toml --out dist
          python -m pip install --find-links dist --no-index embedmind
          EMBEDMIND_BIN="target/release/embedmind" python -m pytest bindings/python/tests -v

  # The benchmark regression guard (docs/BENCHMARKS.md §5, spec S15) lives in
  # its own workflow, .github/workflows/bench.yml — path-filtered to engine/
  # harness changes because a full harness run costs minutes of CPU.
