name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly long fuzz pass (docs/TESTING.md §3): 1h per target.
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        # Windows is a first-class target (founder dogfoods there) — never drop it.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort.pyke.io
            ~/Library/Caches/ort.pyke.io
            ~/AppData/Local/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # The crash harnesses (pager-level `crash.rs` + record-level
  # `crash_records.rs`, docs/TESTING.md §2) run inside `cargo test` above on
  # every platform in the matrix — including Windows, which is first-class.
  #
  # The fuzz bodies also run a stable smoke pass inside `cargo test`
  # (embedmind-core::fuzz); the job below runs the same bodies
  # coverage-guided with libFuzzer.
  fuzz:
    name: fuzz (${{ github.event_name == 'schedule' && 'nightly, 1h/target' || 'short pass' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore accumulated corpus
        # The seed corpus is committed; coverage-driven additions accumulate
        # across runs through this cache (docs/TESTING.md §3).
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - name: Fuzz all targets
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then per_target=3600; else per_target=120; fi
          for target in fuzz_header fuzz_page fuzz_record fuzz_fts_page fuzz_graph_page fuzz_wal_replay fuzz_open_full; do
            cargo fuzz run "$target" -- -max_total_time="$per_target" -rss_limit_mb=4096
          done
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts

  # Python bindings (B5, roadmap 2.5). Their own workspace (bindings/python),
  # so `cargo clippy/test --workspace` above does not reach them — lint, build
  # and exercise them here. One Linux run is enough for PR feedback; the
  # per-platform wheels + pytest live in the release workflow.
  python-bindings:
    name: python bindings
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/python
      - name: Cache ONNX Runtime download (ort pulls this outside target/)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ort.pyke.io
          key: ort-dylib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Format
        run: cargo fmt --manifest-path bindings/python/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path bindings/python/Cargo.toml --all-targets -- -D warnings
      # Build the CLI so the Rust↔Python round-trip tests run (they skip when
      # no binary is found); then build + install the wheel and run pytest.
      - name: Build CLI (for round-trip tests)
        run: cargo build --release -p embedmind
      - name: Build + install wheel and run pytest
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --manifest-path bindings/python/Cargo.toml --out dist
          python -m pip install --find-links dist --no-index embedmind
          EMBEDMIND_BIN="target/release/embedmind" python -m pytest bindings/python/tests -v

  # Remaining placeholder for M1 item 1.8/1.7:
  #   - benchmark regression guard (see docs/BENCHMARKS.md §5)
